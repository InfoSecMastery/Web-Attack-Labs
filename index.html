<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InfoSecMastery Bank - Login</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">🏦</div>
      <h1>InfoSecMastery Bank</h1>
      <p class="subtitle">Secure Banking Platform</p>

      <div class="error-message" id="errorMessage"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        </div>

        <button type="submit" class="login-btn">🔐 Sign In</button>
      </form>

      <div class="demo-credentials">
        <p>📋 Demo Credentials</p>
        <div class="cred"><span>alice</span> <span>password123</span></div>
        <div class="cred"><span>bob</span> <span>secure456</span></div>
        <div class="cred"><span>charlie</span> <span>test789</span></div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      initLoginForm();
    });
  </script>
</body>
</html>
